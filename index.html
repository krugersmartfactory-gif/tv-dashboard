<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>TV Dashboard</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
      height: 100%;
    }

    #container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    iframe {
      border: none;
      transform-origin: top left;
    }

    #loading {
      color: white;
      font-size: 28px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: Arial;
    }
  </style>
</head>

<body>

<div id="container">
  <div id="loading">Loading dashboard...</div>

  <iframe 
    id="frame"
    src="https://datastudio.google.com/embed/reporting/c8eeeae3-7a2f-4e90-b742-15dd046eb619/page/p_tum1v6kxed"
    allowfullscreen>
  </iframe>
</div>

<!-- video giữ màn hình -->
<video autoplay loop muted playsinline style="display:none">
  <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<script>
  const frame = document.getElementById("frame");
  const loading = document.getElementById("loading");

  // ====== SCALE (CHỈNH SIZE TẠI ĐÂY) ======
  let scale = 0.9; 
  // 👉 1.0 = full
  // 👉 0.9 = vừa đẹp TV
  // 👉 1.2 = phóng to

  function resizeFrame() {
    frame.style.width = (100 / scale) + "vw";
    frame.style.height = (100 / scale) + "vh";
    frame.style.transform = "scale(" + scale + ")";
  }

  resizeFrame();

  // Ẩn loading khi load xong
  frame.onload = () => {
    loading.style.display = "none";
  };

  // ====== WAKE LOCK ======
  let wakeLock = null;

  async function keepAwake() {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch (e) {}
  }

  keepAwake();

  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") {
      keepAwake();
    }
  });

  // ====== AUTO REFRESH ======
  setInterval(() => {
    location.reload();
  }, 600000); // 10 phút

  // ====== AUTO FIX TREO ======
  setInterval(() => {
    try {
      frame.contentWindow.location.href;
    } catch (e) {
      location.reload();
    }
  }, 30000);

  // ====== PHÍM + / - ĐỂ ZOOM ======
  document.addEventListener("keydown", (e) => {
    if (e.key === "+") {
      scale += 0.1;
      resizeFrame();
    }
    if (e.key === "-") {
      scale -= 0.1;
      resizeFrame();
    }
  });

</script>

</body>
</html>
