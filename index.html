<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>TV Dashboard</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
      height: 100%;
    }

    #container {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    iframe {
      border: none;
      transform-origin: top left;
    }

    /* thanh loading dưới */
    #loadingBar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 4px;
      width: 0%;
      background: #00ffcc;
      z-index: 999;
      transition: width 0.3s;
    }

    /* nút zoom */
    #controls {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
    }

    #controls button {
      font-size: 22px;
      margin: 5px 0;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: rgba(0,0,0,0.5);
      color: white;
      cursor: pointer;
    }

    #controls button:active {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>

<body>

<div id="container">

  <!-- dashboard -->
  <iframe 
    id="frame"
    src="https://datastudio.google.com/embed/reporting/c8eeeae3-7a2f-4e90-b742-15dd046eb619/page/p_tum1v6kxed"
    allowfullscreen>
  </iframe>

  <!-- loading -->
  <div id="loadingBar"></div>

  <!-- nút zoom -->
  <div id="controls">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">-</button>
  </div>

</div>

<!-- video giữ thức -->
<video autoplay loop muted playsinline style="display:none">
  <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<script>
  const frame = document.getElementById("frame");
  const bar = document.getElementById("loadingBar");

  // ===== SCALE =====
  let scale = 0.9;

  function resizeFrame() {
    frame.style.width = (100 / scale) + "vw";
    frame.style.height = (100 / scale) + "vh";
    frame.style.transform = "scale(" + scale + ")";
  }

  resizeFrame();

  function zoomIn() {
    scale += 0.1;
    resizeFrame();
  }

  function zoomOut() {
    scale -= 0.1;
    resizeFrame();
  }

  // ===== LOADING BAR =====
  let progress = 0;
  let loadingInterval = setInterval(() => {
    progress += Math.random() * 8;
    if (progress > 90) progress = 90;
    bar.style.width = progress + "%";
  }, 300);

  frame.onload = () => {
    clearInterval(loadingInterval);
    bar.style.width = "100%";

    setTimeout(() => {
      bar.style.width = "0%";
      progress = 0;
    }, 500);
  };

  // ===== WAKE LOCK =====
  let wakeLock = null;

  async function keepAwake() {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch (e) {}
  }

  keepAwake();

  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") {
      keepAwake();
    }
  });

  // ===== AUTO REFRESH =====
  setInterval(() => {
    location.reload();
  }, 600000);

  // ===== AUTO FIX TREO =====
  setInterval(() => {
    try {
      frame.contentWindow.location.href;
    } catch (e) {
      location.reload();
    }
  }, 30000);

</script>

</body>
</html>
