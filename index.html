<!DOCTYPE html>
<html>
<head>
  <title>TV Dashboard</title>
  <meta charset="utf-8">
  <style>
    body { margin:0; background:black; }
    iframe {
      width:100vw;
      height:100vh;
      border:none;
    }
  </style>
</head>
<body>

<iframe src="https://datastudio.google.com/embed/reporting/c8eeeae3-7a2f-4e90-b742-15dd046eb619/page/p_tum1v6kxed"></iframe>

<video autoplay loop muted playsinline style="display:none">
  <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<script>
let wakeLock = null;

async function keepAwake() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
  } catch (err) {
    console.log(err);
  }
}

keepAwake();

document.addEventListener('visibilitychange', () => {
  if (wakeLock !== null && document.visibilityState === 'visible') {
    keepAwake();
  }
});

// auto refresh mỗi 5 phút
setInterval(() => {
  location.reload();
}, 300000);
</script>

</body>
</html>
