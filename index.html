<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>TV Dashboard</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
    }
  </style>
</head>

<body>

  <!-- LOOKER STUDIO (LINK ĐÃ FIX) -->
  <iframe 
    src="https://datastudio.google.com/embed/reporting/c8eeeae3-7a2f-4e90-b742-15dd046eb619/page/p_tum1v6kxed"
    allowfullscreen>
  </iframe>

  <!-- VIDEO GIỮ MÀN HÌNH KHÔNG NGỦ -->
  <video autoplay loop muted playsinline style="display:none">
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>

  <script>
    // WAKE LOCK (giữ màn hình sáng)
    let wakeLock = null;

    async function keepAwake() {
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        console.log("Wake Lock ON");
      } catch (err) {
        console.log("Wake Lock lỗi:", err);
      }
    }

    keepAwake();

    // Nếu bị mất focus thì bật lại
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        keepAwake();
      }
    });

    // AUTO REFRESH mỗi 5 phút
    setInterval(() => {
      location.reload();
    }, 300000);
  </script>

</body>
</html>
